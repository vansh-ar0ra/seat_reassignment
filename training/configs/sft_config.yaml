# SFT Training Configuration
# ===========================
# Phase 1: Supervised Fine-Tuning on expert trajectories
#
# Usage:
#   python -m training.train_sft --config training/configs/sft_config.yaml

# Model
model_name: "Qwen/Qwen2.5-7B-Instruct"
dataset_dir: "training/sft_dataset"
output_dir: "checkpoints/sft"

# LoRA
lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"

# Training
num_train_epochs: 3
per_device_train_batch_size: 2
gradient_accumulation_steps: 8        # effective batch size = 16
learning_rate: 1.0e-4                 # higher LR for LoRA
warmup_ratio: 0.05
bf16: true
gradient_checkpointing: true
max_length: 4096                      # multi-turn episodes can be long
logging_steps: 10
save_strategy: "epoch"

# SFT-specific
assistant_only_loss: true             # only train on tool-call tokens
packing: false                        # don't pack — episodes are multi-turn
